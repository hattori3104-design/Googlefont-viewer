<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Font Viewer — Google Fonts Explorer</title>
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --text-muted: #666;
    --text-dim: #444;
    --accent: #c8b89a;
    --accent2: #7a9e8a;
    --danger: #c27a7a;
    --radius: 4px;
    --font-ui: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 13px;
    min-height: 100vh;
  }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 24px;
    height: 52px;
  }
  .logo {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    white-space: nowrap;
  }
  .tabs {
    display: flex;
    gap: 2px;
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 3px;
  }
  .tab {
    padding: 5px 14px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-muted);
    transition: all 0.15s;
    border: none;
    background: none;
    white-space: nowrap;
  }
  .tab.active { background: var(--surface); color: var(--text); }
  .tab:hover:not(.active) { color: var(--text); }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-left: auto;
    flex-wrap: wrap;
  }
  .preview-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 5px 10px;
    font-size: 12px;
    width: 240px;
    outline: none;
    transition: border-color 0.15s;
  }
  .preview-input:focus { border-color: var(--accent); }
  .slider-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    font-size: 11px;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 100px;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }
  #size-label { min-width: 32px; text-align: right; }
  .bg-switcher { display: flex; gap: 4px; }
  .bg-btn {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .bg-btn.active { border-color: var(--accent); }
  .bg-btn[data-bg="white"] { background: #fff; }
  .bg-btn[data-bg="gray"]  { background: #888; }
  .bg-btn[data-bg="black"] { background: #111; }

  /* Category bar */
  .cat-bar {
    display: flex;
    gap: 6px;
    padding: 10px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .cat-bar::-webkit-scrollbar { display: none; }
  .cat-btn {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .cat-btn:hover { border-color: var(--accent); color: var(--text); }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #0e0e0e; }

  /* Main layout */
  main { padding: 24px; }

  /* Pairing bar */
  #pairing-bar {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  #pairing-bar.visible { display: block; }
  .pairing-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .pairing-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .pairing-font-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }
  .pairing-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 8px 3px 6px;
    border-radius: 20px;
    font-size: 11px;
    color: #0e0e0e;
    font-weight: 500;
    cursor: default;
  }
  .pairing-pill-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(0,0,0,0.3);
    flex-shrink: 0;
  }
  .pairing-pill-remove {
    background: none; border: none;
    cursor: pointer;
    color: rgba(0,0,0,0.5);
    font-size: 12px;
    padding: 0;
    line-height: 1;
    margin-left: 2px;
  }
  .pairing-pill-remove:hover { color: #000; }

  /* Composer */
  .composer {
    background: transparent;
    border-radius: var(--radius);
    padding: 0;
    min-height: 0;
    display: flex;
    flex-wrap: wrap;
    font-size: 0;
    align-items: baseline;
    gap: 0;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .composer-segment {
    position: relative;
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    margin: 0;
    cursor: grab;
    user-select: none;
  }
  .composer-segment.dragging { opacity: 0.35; cursor: grabbing; }
  .composer-segment.drag-over { outline: 1px dashed var(--accent); border-radius: 2px; }
  .composer-segment-text {
    border: none;
    outline: none;
    background: transparent;
    color: var(--text);
    padding: 2px 4px;
    min-width: 60px;
    width: auto;
    caret-color: var(--accent);
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
    cursor: text;
  }
  .composer-segment-text:focus { border-bottom-color: var(--accent); }
  .composer-segment-controls {
    display: flex;
    align-items: center;
    gap: 3px;
    margin-top: 3px;
    font-size: 11px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .composer-segment:hover .composer-segment-controls,
  .composer-segment:focus-within .composer-segment-controls { opacity: 1; }
  .seg-font-btn {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    cursor: pointer;
    transition: transform 0.1s, border-color 0.1s;
    flex-shrink: 0;
    background: var(--border);
  }
  .seg-font-btn:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.5); }
  .seg-font-btn.selected { border-color: var(--accent); background: var(--surface); }
  .seg-font-label {
    font-size: 9px;
    color: var(--text-dim);
    max-width: 60px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: 0.03em;
  }
  .seg-delete-btn {
    background: none; border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 11px;
    padding: 0 2px;
    line-height: 1;
  }
  .seg-delete-btn:hover { color: var(--danger); }
  .seg-drag-handle {
    color: var(--text-dim);
    font-size: 11px;
    cursor: grab;
    padding: 0 2px;
    user-select: none;
  }
  .composer-add-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    background: none;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    margin: 2px;
    align-self: center;
  }
  .composer-add-btn:hover { border-color: var(--accent); color: var(--text); }
  .composer-hint {
    font-size: 10px;
    margin-top: 4px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }
  .pairing-section + .pairing-section { margin-top: 20px; }
  .body-copy-text {
    width: 100%;
    background: transparent;
    border: none;
    border-radius: 0;
    color: var(--text);
    padding: 0;
    resize: vertical;
    min-height: 90px;
    outline: none;
    line-height: 1.7;
    caret-color: var(--accent);
  }
  .body-empty-hint {
    background: var(--surface2);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 18px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  /* Font card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    position: relative;
    transition: border-color 0.15s;
    overflow: hidden;
  }
  .card:hover { border-color: #3a3a3a; }
  .card.paired { border-color: var(--accent2); }
  .card.favorited { border-color: var(--accent); }

  .card-actions {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 4px;
  }
  .icon-btn {
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--text); }
  .icon-btn.active { background: var(--accent); border-color: var(--accent); color: #0e0e0e; }
  /* CSSコピーボタン */
  .icon-btn.copy-btn {
    border-color: var(--accent2);
    color: var(--accent2);
    margin-left: 4px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0;
  }
  .icon-btn.copy-btn:hover { background: var(--accent2); border-color: var(--accent2); color: #0e0e0e; }
  .icon-btn.copy-done { background: #4caf84; border-color: #4caf84; color: #0e0e0e; }

  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 18px;
    font-size: 12px;
    color: var(--text);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 9999;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.error { border-color: #e07070; color: #e07070; }

  .card-meta {
    margin-bottom: 14px;
    padding-right: 104px;
  }
  .card-name {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    margin-bottom: 2px;
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  .card-cat {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .card-preview {
    line-height: 1.35;
    word-break: break-word;
    color: var(--text);
    transition: font-size 0.1s;
  }

  /* Status bar */
  #status {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    padding: 20px;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Preview bg variants */
  .card.bg-white { background: #fff; --text: #111; --text-muted: #888; --text-dim: #bbb; --border: #e0e0e0; --surface2: #f5f5f5; }
  .card.bg-gray  { background: #888; --text: #fff; --text-muted: #ccc; --text-dim: #aaa; --border: #777; --surface2: #999; }
  .card.bg-black { background: #111; --text: #eee; --text-muted: #666; --text-dim: #444; --border: #2a2a2a; --surface2: #1a1a1a; }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 13px;
  }

  @media (max-width: 600px) {
    .header-controls { flex-direction: column; align-items: flex-start; }
    .preview-input { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">Font Viewer</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('google')">Google Fonts</button>
      <button class="tab" onclick="switchTab('favorites')">お気に入り ★</button>
    </div>
    <div class="header-controls">
      <input class="preview-input" id="preview-text" type="text" value="美しい活字、The quick brown fox." placeholder="プレビューテキストを入力">
      <div class="slider-wrap">
        <span>Aa</span>
        <input type="range" id="font-size" min="16" max="96" value="32" oninput="updateSize(this.value)">
        <span id="size-label">32px</span>
      </div>
      <div class="bg-switcher">
        <div class="bg-btn active" data-bg="black" onclick="setBg(this)"></div>
        <div class="bg-btn" data-bg="gray" onclick="setBg(this)"></div>
        <div class="bg-btn" data-bg="white" onclick="setBg(this)"></div>
      </div>
    </div>
  </div>
  <div class="cat-bar" id="cat-bar"></div>
</header>

<main>
  <div id="pairing-bar">
    <div class="pairing-section">
      <div class="pairing-header">
        <div class="pairing-label">見出しコピー</div>
        <div class="pairing-font-pills" id="headline-pills"></div>
      </div>
      <div class="composer" id="composer"></div>
      <div class="composer-hint">テキストをクリックして編集 · ドラッグで並び替え</div>
    </div>
    <div class="pairing-section" id="body-section">
      <div class="pairing-header">
        <div class="pairing-label">ボディコピー</div>
        <div class="pairing-font-pills" id="body-pill"></div>
      </div>
      <div id="body-area"></div>
    </div>
  </div>
  <div class="grid" id="grid"></div>
  <div id="status"><div class="spinner"></div></div>
</main>

<script>
// ── エスケープユーティリティ ─────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function escAttrJSON(obj) {
  return JSON.stringify(obj)
    .replace(/&/g,"&amp;").replace(/'/g,"&#39;").replace(/"/g,"&quot;")
    .replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function escCssFamily(s) {
  return String(s).replace(/[\\'"<>;{}()]/g,"");
}

// ── 定数 ────────────────────────────────────────────────────────
const GOOGLE_FONTS_API_KEY = "AIzaSyCBypnmUTlnCB9OCqETz5mMK1u9YkUyufc";
const BATCH = 100;
const HEADLINE_MAX = 3;

const CATEGORIES = [
  { id: "all",        label: "すべて" },
  { id: "japanese",   label: "日本語" },
  { id: "serif",      label: "セリフ" },
  { id: "sans-serif", label: "サンセリフ" },
  { id: "handwriting",label: "手書き" },
  { id: "display",    label: "ディスプレイ" },
  { id: "monospace",  label: "等幅" },
];

// ── 状態 ────────────────────────────────────────────────────────
let state = {
  tab: "google",
  category: "all",
  previewText: "美しい活字、The quick brown fox.",
  fontSize: 32,
  bg: "black",
  googleFonts: [],
  googleLoaded: false,
  visibleCount: BATCH,
  favorites: JSON.parse(localStorage.getItem("fv_pub_favorites") || "[]"),
  headline: [],
  bodyFont: null,
  bodyText: "廃車の運命だった一台一台が、サステナブルな未来の一助になる。\n私たちのビジネスは、日々の積み重ねによって支えられています。",
  loadedGFonts: new Set(),
};

let composerSegments = [
  { text: "デザインの力、", fontIdx: 0 },
  { text: "Creativity",    fontIdx: 0 },
];

// ── ヘッダー操作 ─────────────────────────────────────────────────
document.getElementById("preview-text").addEventListener("input", e => {
  state.previewText = e.target.value;
  render();
});

function updateSize(v) {
  state.fontSize = parseInt(v);
  document.getElementById("size-label").textContent = v + "px";
  render();
}

function setBg(el) {
  document.querySelectorAll(".bg-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  state.bg = el.dataset.bg;
  render();
}

// ── タブ / カテゴリ ──────────────────────────────────────────────
function switchTab(tab) {
  state.tab = tab;
  state.category = "all";
  state.visibleCount = BATCH;
  document.querySelectorAll(".tab").forEach((b, i) => {
    b.classList.toggle("active", ["google","favorites"][i] === tab);
  });
  renderCatBar();
  if (tab === "google" && !state.googleLoaded) {
    loadGoogleFonts();
  } else {
    render();
  }
}

function renderCatBar() {
  const bar = document.getElementById("cat-bar");
  if (state.tab === "favorites") { bar.innerHTML = ""; return; }
  bar.innerHTML = CATEGORIES.map(c =>
    `<button class="cat-btn ${state.category === c.id ? 'active' : ''}" onclick="setCategory('${c.id}')">${c.label}</button>`
  ).join("");
}

function setCategory(id) {
  state.category = id;
  state.visibleCount = BATCH;
  renderCatBar();
  render();
}

// ── Google Fonts ─────────────────────────────────────────────────
async function loadGoogleFonts() {
  document.getElementById("status").innerHTML = '<div class="spinner"></div>';
  document.getElementById("grid").innerHTML = "";

  const failStatuses = [];
  async function fetchFonts(url, cat) {
    try {
      const r = await fetch(url);
      if (!r.ok) { failStatuses.push(r.status); throw new Error(`HTTP ${r.status}`); }
      const d = await r.json();
      if (d.error) { if (d.error.code) failStatuses.push(d.error.code); throw new Error(d.error.message); }
      return (d.items || []).map(f => ({ name: f.family, family: f.family, cat }));
    } catch (e) {
      if (e instanceof TypeError) failStatuses.push("network");
      return [];
    }
  }

  const cats = ["serif","sans-serif","handwriting","display","monospace"];
  const base = `https://www.googleapis.com/webfonts/v1/webfonts?key=${GOOGLE_FONTS_API_KEY}&sort=popularity`;
  const results = await Promise.all([
    ...cats.map(cat => fetchFonts(`${base}&category=${cat}`, cat)),
    fetchFonts(`${base}&subset=japanese`, "japanese"),
  ]);

  const fonts = results.flat();
  if (fonts.length === 0) {
    let msg = "Google Fonts の読み込みに失敗しました";
    if (failStatuses.includes("network")) msg = "ネットワークに接続できません";
    if (failStatuses.includes(403)) msg = "APIキーが無効です（権限エラー）";
    if (failStatuses.includes(429)) msg = "アクセスが集中しています。少し待ってから再試行してください";
    document.getElementById("status").innerHTML =
      `<div class="empty">${escHtml(msg)}<br>
       <button onclick="loadGoogleFonts()" style="margin-top:12px;padding:6px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);cursor:pointer;font-size:12px">再試行</button>
       </div>`;
    return;
  }
  state.googleFonts = fonts;
  state.googleLoaded = true;
  render();
}

function loadGFont(family) {
  if (state.loadedGFonts.has(family)) return;
  state.loadedGFonts.add(family);
  const link = document.createElement("link");
  link.rel = "stylesheet";
  link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(family)}&display=swap`;
  document.head.appendChild(link);
}

// ── トースト ─────────────────────────────────────────────────────
let _toastTimer = null;
function showToast(msg, isError) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "show" + (isError ? " error" : "");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { t.className = ""; }, 2500);
}

// ── CSSコピー ────────────────────────────────────────────────────
function copyCSS(font) {
  const css = `font-family: '${font.family}', sans-serif;`;
  navigator.clipboard.writeText(css).then(() => {
    showToast(`コピーしました: ${css}`);
  }).catch(() => {
    // フォールバック
    const el = document.createElement("textarea");
    el.value = css;
    el.style.position = "fixed";
    el.style.opacity = "0";
    document.body.appendChild(el);
    el.select();
    document.execCommand("copy");
    document.body.removeChild(el);
    showToast(`コピーしました: ${css}`);
  });
}

// ── お気に入り ───────────────────────────────────────────────────
function toggleFavoriteByFont(font) {
  const idx = state.favorites.indexOf(font.name);
  if (idx >= 0) state.favorites.splice(idx, 1);
  else state.favorites.push(font.name);
  localStorage.setItem("fv_pub_favorites", JSON.stringify(state.favorites));
  render();
}

// ── ペアリング ───────────────────────────────────────────────────
function toggleHeadline(font) {
  const idx = state.headline.findIndex(f => f.name === font.name);
  if (idx >= 0) {
    state.headline.splice(idx, 1);
    composerSegments = composerSegments.map(s => ({
      ...s, fontIdx: Math.min(s.fontIdx, Math.max(0, state.headline.length - 1))
    }));
  } else if (state.headline.length < HEADLINE_MAX) {
    state.headline.push(font);
  } else {
    showToast(`見出しコピーは最大${HEADLINE_MAX}フォントまでです`, true);
    return;
  }
  renderPairing();
  render();
}

function removeHeadline(idx) {
  state.headline.splice(idx, 1);
  composerSegments = composerSegments.map(s => ({
    ...s, fontIdx: Math.min(s.fontIdx, Math.max(0, state.headline.length - 1))
  }));
  renderPairing();
  render();
}

function toggleBody(font) {
  if (state.bodyFont && state.bodyFont.name === font.name) state.bodyFont = null;
  else state.bodyFont = font;
  renderPairing();
  render();
}

function removeBody() {
  state.bodyFont = null;
  renderPairing();
  render();
}

const PILL_COLORS = ["#c8b89a","#7a9e8a","#9ab0c8"];

function renderPairing() {
  const bar = document.getElementById("pairing-bar");
  if (state.headline.length === 0 && !state.bodyFont) {
    bar.classList.remove("visible");
    return;
  }
  bar.classList.add("visible");

  // 見出しコピー pills
  const hPills = document.getElementById("headline-pills");
  hPills.innerHTML = state.headline.map((f, i) => `
    <span class="pairing-pill" style="background:${PILL_COLORS[i]}">
      <span class="pairing-pill-dot"></span>
      ${escHtml(f.name)}
      <button class="pairing-pill-remove" onclick="removeHeadline(${i})">×</button>
    </span>`).join("");

  // ボディコピー pill
  const bPill = document.getElementById("body-pill");
  bPill.innerHTML = state.bodyFont ? `
    <span class="pairing-pill" style="background:var(--accent)">
      <span class="pairing-pill-dot"></span>
      ${escHtml(state.bodyFont.name)}
      <button class="pairing-pill-remove" onclick="removeBody()">×</button>
    </span>` : "";

  renderComposer();
  renderBodyArea();
}

function renderComposer() {
  if (state.headline.length === 0) {
    document.getElementById("composer").innerHTML = "";
    return;
  }
  const html = composerSegments.map((seg, si) => {
    const font = state.headline[seg.fontIdx] || state.headline[0];
    const dotBtns = state.headline.map((f, fi) => `
      <span class="seg-font-btn ${seg.fontIdx === fi ? 'selected' : ''}"
        style="background:${seg.fontIdx === fi ? PILL_COLORS[fi]+'33' : ''}"
        title="${escHtml(f.name)}"
        onclick="setSegFont(${si},${fi})"></span>
      <span class="seg-font-label">${escHtml(f.name.split(' ')[0])}</span>`).join("");
    return `
      <span class="composer-segment"
        draggable="true"
        ondragstart="onSegDragStart(event,${si})"
        ondragover="onSegDragOver(event,${si})"
        ondragleave="onSegDragLeave(event)"
        ondrop="onSegDrop(event,${si})"
        ondragend="onSegDragEnd(event)">
        <input class="composer-segment-text"
          style="font-family:'${escCssFamily(font.family)}',serif,sans-serif;font-size:${state.fontSize}px"
          value="${escHtml(seg.text)}"
          oninput="updateSegText(${si},this.value);autoResize(this)"
          onfocus="this.closest('.composer-segment').style.cursor='text'"
          onblur="this.closest('.composer-segment').style.cursor='grab'">
        <span class="composer-segment-controls">
          <span class="seg-drag-handle">⠿</span>
          ${dotBtns}
          ${composerSegments.length > 1 ? `<button class="seg-delete-btn" onclick="deleteSeg(${si})">✕</button>` : ""}
        </span>
      </span>`;
  }).join("") + `
    <button class="composer-add-btn" onclick="addSeg()">＋ テキストを追加</button>`;
  document.getElementById("composer").innerHTML = html;
  document.querySelectorAll(".composer-segment-text").forEach(autoResize);
}

function renderBodyArea() {
  const area = document.getElementById("body-area");
  if (!state.bodyFont) {
    area.innerHTML = '<div class="body-empty-hint">フォントカードの「本」ボタンでフォントを設定</div>';
    return;
  }
  area.innerHTML = `<textarea class="body-copy-text"
    style="font-family:'${escCssFamily(state.bodyFont.family)}',serif,sans-serif;font-size:${Math.round(state.fontSize * 0.5)}px"
    placeholder="ボディコピーを入力"
    oninput="state.bodyText=this.value">${escHtml(state.bodyText)}</textarea>`;
}

function autoResize(el) {
  const tmp = document.createElement("span");
  tmp.style.cssText = window.getComputedStyle(el).cssText;
  tmp.style.visibility = "hidden";
  tmp.style.position = "absolute";
  tmp.style.width = "auto";
  tmp.textContent = el.value || " ";
  document.body.appendChild(tmp);
  el.style.width = Math.max(40, tmp.offsetWidth + 8) + "px";
  document.body.removeChild(tmp);
}

function updateSegText(si, val) { composerSegments[si].text = val; }
function setSegFont(si, fi) { composerSegments[si].fontIdx = fi; renderComposer(); }

function addSeg() {
  if (state.headline.length === 0) return;
  composerSegments.push({ text: "テキスト", fontIdx: composerSegments.length % state.headline.length });
  renderComposer();
}
function deleteSeg(si) { composerSegments.splice(si, 1); renderComposer(); }

// Drag & drop
let dragSrcIdx = null;
function onSegDragStart(e, si) { dragSrcIdx = si; e.currentTarget.classList.add("dragging"); e.dataTransfer.effectAllowed = "move"; }
function onSegDragOver(e, si) {
  if (dragSrcIdx === null || dragSrcIdx === si) return;
  e.preventDefault(); e.dataTransfer.dropEffect = "move";
  e.currentTarget.classList.add("drag-over");
}
function onSegDragLeave(e) { e.currentTarget.classList.remove("drag-over"); }
function onSegDrop(e, si) {
  e.preventDefault(); e.currentTarget.classList.remove("drag-over");
  if (dragSrcIdx === null || dragSrcIdx === si) return;
  const moved = composerSegments.splice(dragSrcIdx, 1)[0];
  composerSegments.splice(dragSrcIdx < si ? si - 1 : si, 0, moved);
  dragSrcIdx = null; renderComposer();
}
function onSegDragEnd(e) {
  dragSrcIdx = null;
  document.querySelectorAll(".composer-segment").forEach(el => el.classList.remove("dragging","drag-over"));
}

// ── カテゴリ表示ラベル ────────────────────────────────────────────
function catLabel(cat) {
  const map = {
    "serif":"セリフ","sans-serif":"サンセリフ","handwriting":"手書き",
    "display":"ディスプレイ","monospace":"等幅","japanese":"日本語",
  };
  return map[cat] || cat;
}

// ── レンダリング ─────────────────────────────────────────────────
function render() {
  const grid   = document.getElementById("grid");
  const status = document.getElementById("status");

  let fonts = [];
  if (state.tab === "google") {
    fonts = state.googleFonts;
  } else if (state.tab === "favorites") {
    fonts = state.googleFonts.filter(f => state.favorites.includes(f.name));
  }

  if (state.category !== "all" && state.tab !== "favorites") {
    fonts = fonts.filter(f => f.cat === state.category);
  }

  if (fonts.length === 0 && state.tab === "google" && !state.googleLoaded) return;

  if (fonts.length === 0) {
    grid.innerHTML = "";
    status.innerHTML = '<div class="empty">表示するフォントがありません</div>';
    return;
  }
  status.innerHTML = "";

  const needsPaging = state.tab === "google";
  const visible   = needsPaging ? fonts.slice(0, state.visibleCount) : fonts;
  const remaining = needsPaging ? fonts.length - visible.length : 0;

  // Load Google Fonts CSS
  visible.forEach(f => loadGFont(f.family));

  const text    = state.previewText || "Aa";
  const fs      = state.fontSize;
  const bgClass = `bg-${state.bg}`;

  grid.innerHTML = visible.map(font => {
    const isFav      = state.favorites.includes(font.name);
    const isHeadline = state.headline.find(f => f.name === font.name);
    const isBody     = state.bodyFont && state.bodyFont.name === font.name;
    const fontEncoded = escAttrJSON(font);
    return `
      <div class="card ${bgClass} ${isHeadline || isBody ? 'paired' : ''} ${isFav ? 'favorited' : ''}">
        <div class="card-actions">
          <div class="icon-btn ${isHeadline ? 'active' : ''}" title="見出しコピーに追加（最大3）" onclick='toggleHeadline(${fontEncoded})'>見</div>
          <div class="icon-btn ${isBody ? 'active' : ''}" title="ボディコピーに設定" onclick='toggleBody(${fontEncoded})'>本</div>
          <div class="icon-btn ${isFav ? 'active' : ''}" title="お気に入り" onclick='toggleFavoriteByFont(${fontEncoded})'>★</div>
          <div class="icon-btn copy-btn" title="CSSをコピー" onclick='copyCSS(${fontEncoded})'>CSS</div>
        </div>
        <div class="card-meta">
          <div class="card-name">${escHtml(font.name)}</div>
          <div class="card-cat">${escHtml(catLabel(font.cat))}</div>
        </div>
        <div class="card-preview" style="font-family:'${escCssFamily(font.family)}',serif,sans-serif;font-size:${fs}px">${escHtml(text)}</div>
      </div>`;
  }).join("");

  if (remaining > 0) {
    status.innerHTML = `
      <div style="text-align:center;padding:20px 0">
        <span style="font-size:11px;color:var(--text-muted)">${visible.length} / ${fonts.length} 件表示</span><br>
        <button onclick="loadMore()" style="margin-top:10px;padding:7px 20px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);cursor:pointer;font-size:12px">
          さらに ${Math.min(remaining, BATCH)} 件表示
        </button>
      </div>`;
  } else if (needsPaging && fonts.length > 0) {
    status.innerHTML = `<div style="font-size:11px;color:var(--text-dim);text-align:center;padding:12px">全 ${fonts.length} 件表示</div>`;
  }

  if (state.headline.length > 0 || state.bodyFont) renderPairing();
}

function loadMore() { state.visibleCount += BATCH; render(); }

// ── 起動 ────────────────────────────────────────────────────────
renderCatBar();
loadGoogleFonts();
</script>

<div id="toast"></div>
</body>
</html>
